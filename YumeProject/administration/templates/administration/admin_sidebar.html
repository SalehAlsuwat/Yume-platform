    <div class="d-flex flex-column flex-shrink-0 border-end" style="width:230px;">

        <div class="p-3 border-bottom">
            <span class="fw-semibold small text-uppercase text-muted tracking-wide">
                <i class="bi bi-shield-lock me-2"></i>Admin Panel
            </span>
        </div>

        <nav class="nav nav-pills flex-column gap-1 p-2 flex-grow-1">

            <span class="px-2 py-1 small text-muted text-uppercase" style="font-size:.7rem;">Overview</span>
            <a href="{% url 'administration:admin_view' %}"
               class="nav-link d-flex align-items-center gap-2 {% if request.resolver_match.url_name == 'admin_view' %}active{% endif %}"
               data-bs-toggle="tab" data-bs-target="#dashboard" role="tab">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <span class="px-2 pt-3 pb-1 small text-muted text-uppercase" style="font-size:.7rem;">Hotels</span>
            <a href="#requests"
               class="nav-link d-flex align-items-center gap-2"
               data-bs-toggle="tab" data-bs-target="#requests" role="tab">
                <i class="bi bi-hourglass-split"></i> Pending Requests
            </a>
            <a href="#approved-hotels"
               class="nav-link d-flex align-items-center gap-2"
               data-bs-toggle="tab" data-bs-target="#approved-hotels" role="tab">
                <i class="bi bi-building-check"></i> Approved Hotels
            </a>

            <span class="px-2 pt-3 pb-1 small text-muted text-uppercase" style="font-size:.7rem;">Users</span>
            <a href="#all-users"
               class="nav-link d-flex align-items-center gap-2"
               data-bs-toggle="tab" data-bs-target="#all-users" role="tab">
                <i class="bi bi-people"></i> All Users
            </a>
            <a href="#owners"
               class="nav-link d-flex align-items-center gap-2"
               data-bs-toggle="tab" data-bs-target="#owners" role="tab">
                <i class="bi bi-person-badge"></i> Owners
            </a>

            <span class="px-2 pt-3 pb-1 small text-muted text-uppercase" style="font-size:.7rem;">System</span>
            <a href="#cities"
               class="nav-link d-flex align-items-center gap-2"
               data-bs-toggle="tab" data-bs-target="#cities" role="tab">
                <i class="bi bi-geo-alt"></i> Cities
            </a>
            <a href="#contact-requests"
               class="nav-link d-flex align-items-center gap-2"
               data-bs-toggle="tab" data-bs-target="#contact-requests" role="tab">
                <i class="bi bi-envelope"></i> Contact Requests
            </a>
            <a href="{% url 'admin:index' %}" class="nav-link d-flex align-items-center gap-2">
                <i class="bi bi-terminal"></i> Advanced Admin
            </a>

        </nav>

        <div class="p-3 border-top">
            <form method="post" action="{% url 'accounts:sign_out' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-secondary w-100">
                    <i class="bi bi-box-arrow-left me-1"></i> Sign out
                </button>
            </form>
        </div>

    </div>
