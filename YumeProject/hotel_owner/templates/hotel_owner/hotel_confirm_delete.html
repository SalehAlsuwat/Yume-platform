{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Hotel{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-6">

        <h2>Delete Hotel</h2>
        <hr>

        <div class="card">
            <div class="card-body">

                <p>Are you sure you want to delete <strong>{{ hotel.name }}</strong>?</p>
                <p class="text-muted small">
                    <i class="bi bi-exclamation-triangle text-danger"></i>
                    This will also delete all <strong>{{ hotel.capsules.count }} capsules</strong> linked to this hotel.
                </p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">
                            Yes, Delete
                        </button>
                        <a href="{% url 'hotel_owner:my_hotels' %}" class="btn btn-outline-dark">
                            Cancel
                        </a>
                    </div>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
